_schema-version: 3.3.0
ID: btp-cap10-fullstack-project
description: A simple CAP project.
version: 1.0.0
modules:
- name: btp-cap10-fullstack-project-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: btp-cap10-fullstack-project-db
  - name: uaa_btp-cap10-fullstack-project
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: btp-cap10-fullstack-project-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: btp-cap10-fullstack-project-db
  parameters:
    buildpack: nodejs_buildpack
- name: btp-cap10-fullstack-project-destination-content
  type: com.sap.application.content
  requires:
  - name: btp-cap10-fullstack-project-destination-service
    parameters:
      content-target: true
  - name: btp-cap10-fullstack-project_html_repo_host
    parameters:
      service-key:
        name: btp-cap10-fullstack-project_html_repo_host-key
  - name: uaa_btp-cap10-fullstack-project
    parameters:
      service-key:
        name: uaa_btp-cap10-fullstack-project-key
  parameters:
    content:
      instance:
        destinations:
        - Name: ui_managedapprouter_btp_cap10_fullstack_project_html_repo_host
          ServiceInstanceName: btp-cap10-fullstack-project-html5-app-host-service
          ServiceKeyName: btp-cap10-fullstack-project_html_repo_host-key
          sap.cloud.service: ui_managedapprouter
        - Authentication: OAuth2UserTokenExchange
          Name: ui_managedapprouter_uaa_btp_cap10_fullstack_project
          ServiceInstanceName: btp-cap10-fullstack-project-xsuaa-service
          ServiceKeyName: uaa_btp-cap10-fullstack-project-key
          sap.cloud.service: ui_managedapprouter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: btp-cap10-fullstack-project-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: btp-cap10-fullstack-project_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - btpuiassessments.zip
      name: btpuiassessments
      target-path: resources/
- name: btpuiassessments
  type: html5
  path: app/btp_ui_assessments
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: btp-cap10-fullstack-project-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: btp-cap10-fullstack-project-destination-service
  type: org.cloudfoundry.managed-service
  requires:
    - name: srv-api
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            Name: fs-app-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: btp-cap10-fullstack-project-destination-service
    service-plan: lite
- name: btp-cap10-fullstack-project_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: btp-cap10-fullstack-project-html5-app-host-service
    service-plan: app-host
- name: uaa_btp-cap10-fullstack-project
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: btp-cap10-fullstack-project-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
